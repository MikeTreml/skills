<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill &amp; Agent Library</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Skill &amp; Agent Library</h1>
        <input id="search" class="search" type="search" placeholder="Search skills &amp; agents…" />
        <span id="status" class="status"></span>
        <button id="import" class="primary">⟳ Scan &amp; import</button>
      </header>
      <div class="layout">
        <nav class="sidebar">
          <div id="filters"></div>
          <section id="sources" class="sources"></section>
        </nav>
        <main class="content">
          <ul id="items" class="items"></ul>
          <p id="empty" class="empty" hidden>Nothing here yet — click <b>Scan &amp; import</b>.</p>
        </main>
      </div>
    </div>
  </body>
</html>
